version: '3.8'

services:
  # ============================================
  # POSTGRESQL DATABASE
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: carecompass-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-carecompass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carecompass_secure_password_2026}
      POSTGRES_DB: ${POSTGRES_DB:-carecompass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carecompass}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carecompass-network

  # ============================================
  # REDIS CACHE
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: carecompass-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-carecompass_redis_2026}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-carecompass_redis_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carecompass-network

  # ============================================
  # API APPLICATION
  # ============================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: carecompass-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-carecompass}:${POSTGRES_PASSWORD:-carecompass_secure_password_2026}@postgres:5432/${POSTGRES_DB:-carecompass}
      REDIS_URL: redis://:${REDIS_PASSWORD:-carecompass_redis_2026}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-15m}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
    networks:
      - carecompass-network

  # ============================================
  # PGADMIN (Optional - Database GUI)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: carecompass-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@carecompass.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - carecompass-network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  carecompass-network:
    driver: bridge
